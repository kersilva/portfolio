<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>

    <style type="text/tailwindcss">
        @import "tailwindcss";
        @custom-variant dark (&:where(.dark, .dark *));
    </style>

    <script>
        const tema = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

        document.documentElement.classList.add(tema);
    </script>
</head>

<body class="bg-white dark:bg-gray-900 transition-colors duration-300">
    <div class="absolute right-0 bottom-0 p-5 flex justify-center items-center">
        <div onclick="mudaTema()"
            class="relative bg-gray-200/50 dark:bg-white/5 shadow-xl/10 dark:shadow-xl/30 rounded-xl p-1 flex items-center gap-1 cursor-pointer group">

            <div id="sol-icon" class="relative z-10 aspect-square p-1 rounded-lg text-black dark:text-white">
                <div class="size-6 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                    </svg>
                </div>
            </div>

            <div id="lua-icon" class="relative z-10 aspect-square p-1 rounded-lg text-gray-400 dark:text-gray-500">
                <div class="size-6 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                    </svg>
                </div>
            </div>

            <div id="tema-toggle"
                class="absolute inset-y-1 mx-1 left-0 z-0 aspect-square h-[calc(100%-8px)] bg-white dark:bg-gray-700 shadow-sm rounded-lg transition-transform duration-300 ease-in-out translate-x-0">
            </div>
        </div>
    </div>

    <div class="h-screen flex items-center text-black dark:text-white">
        <div class="md:max-w-3/4 w-full mx-auto flex flex-col">
            <span class="text-lg">Eu sou o</span>
            <span class="text-7xl">Kelwin</span>
        </div>
    </div>

    <script>
        const html = document.documentElement;

        function iconSelecionado(icon, selecionado) {
            if (selecionado) {
                icon.classList.add('text-black', 'dark:text-white');
                icon.classList.remove('text-gray-400', 'dark:text-gray-500');
            } else {
                icon.classList.add('text-gray-400', 'dark:text-gray-500');
                icon.classList.remove('text-black', 'dark:text-white');
            }

        }

        function atualizaTema() {
            const temaToggle = document.getElementById('tema-toggle');

            const solIcon = document.getElementById('sol-icon');
            const luaIcon = document.getElementById('lua-icon');

            if (html.classList.contains('dark')) {
                temaToggle.classList.add('translate-x-9');
                temaToggle.classList.remove('translate-x-0');

                iconSelecionado(luaIcon, true);
                iconSelecionado(solIcon, false);
            } else {
                temaToggle.classList.add('translate-x-0');
                temaToggle.classList.remove('translate-x-9');

                iconSelecionado(luaIcon, false);
                iconSelecionado(solIcon, true);
            }
        }

        function mudaTema() {
            html.classList.toggle('dark');
            html.classList.toggle('light');

            atualizaTema();
        }

        atualizaTema();
    </script>
</body>

</html>
